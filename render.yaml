services:
  - type: web
    name: northbound-companion
    runtime: node
    plan: free
    region: frankfurt
    rootDir: companion
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- -p $PORT
    healthCheckPath: /
    autoDeploy: true
    domains:
      - companion.northboundwines.com
    envVars:
      - key: NODE_VERSION
        value: 22.22.2
      - key: NEXT_PUBLIC_SANITY_PROJECT_ID
        value: 5893l6y0
      - key: NEXT_PUBLIC_SANITY_DATASET
        value: production
      - key: NEXT_PUBLIC_SANITY_API_VERSION
        value: 2026-05-26
